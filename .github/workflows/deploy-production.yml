# On push to main: typecheck, then deploy to Railway production.
# Add RAILWAY_TOKEN in Settings → Environments → production.
name: Test and Deploy to Production

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.5"

jobs:
  test:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  deploy:
    name: Deploy to Railway Production
    runs-on: ubuntu-latest
    needs: test
    if: success()
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Production
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN not set for production. Add it in Settings → Environments → production (project token for production environment)."
            exit 1
          fi
          railway up --service rails-docs-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
