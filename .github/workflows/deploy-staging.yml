# On push to staging: typecheck, then deploy to Railway staging.
# Uses RAILWAY_TOKEN from the GitHub "staging" environment.
name: Test and Deploy to Staging

on:
  push:
    branches:
      - staging

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.5"

jobs:
  test:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    needs: test
    if: success()
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Staging
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN not set for staging. Add it in Settings → Environments → staging (project token for staging environment)."
            exit 1
          fi
          railway up --service rails-docs-staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
