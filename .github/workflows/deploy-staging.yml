# On push to staging: typecheck, then deploy to Railway staging.
# Uses RAILWAY_TOKEN from the GitHub "staging" environment.
name: Test and Deploy to Staging

on:
  push:
    branches:
      - staging

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.5"

jobs:
  test:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    needs: test
    if: success()
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Staging
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN not set for staging. Add it in Settings → Environments → staging (project token for staging environment)."
            exit 1
          fi
          railway up --service rails-docs-staging --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
